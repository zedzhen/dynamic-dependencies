repos:
  - repo: https://github.com/pycqa/isort
    rev: 8.0.1
    hooks:
      - id: isort
        name: isort
  - repo: https://github.com/psf/black-pre-commit-mirror
    rev: 26.5.1
    hooks:
      - id: black
  - repo: https://github.com/pypa/dependency-groups
    rev: 1.3.1
    hooks:
      - id: lint-dependency-groups
  - repo: https://github.com/tox-dev/pyproject-fmt
    rev: v2.25.1
    hooks:
      - id: pyproject-fmt
